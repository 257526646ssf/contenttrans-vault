<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>个人私有云仓库</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="hero">
        <div class="hero__grain"></div>
        <div class="hero__glow hero__glow--one"></div>
        <div class="hero__glow hero__glow--two"></div>
        <div class="eyebrow">Personal Vault</div>
        <h1>个人私有云仓库</h1>
        <p class="hero__copy">
          一个只给自己用的文件仓库。手机、电脑随时上传，按时间找回，直接下载使用。
        </p>
        <div class="stats">
          <div class="stat">
            <span>文件数</span>
            <strong id="statTotal">0</strong>
          </div>
          <div class="stat">
            <span>占用空间</span>
            <strong id="statSize">0 MB</strong>
          </div>
          <div class="stat">
            <span>收藏</span>
            <strong id="statFav">0</strong>
          </div>
        </div>
        <div class="hero__note">
          默认单用户、无显式登录。建议部署在私有环境或反向代理之后。
        </div>
      </aside>

      <main class="workspace">
        <section class="toolbar card">
          <div class="toolbar__group">
            <div class="field">
              <label for="deviceName">设备名</label>
              <input id="deviceName" type="text" placeholder="例如：工作电脑 / 安卓手机" />
            </div>
            <div class="field">
              <label for="searchInput">搜索</label>
              <input id="searchInput" type="search" placeholder="文件名、备注、标签" />
            </div>
          </div>
          <div class="toolbar__group toolbar__group--actions">
            <button id="uploadBtn" class="btn btn--primary">上传文件</button>
            <button id="batchDownloadBtn" class="btn">批量下载</button>
            <button id="batchDeleteBtn" class="btn">批量删除</button>
            <input id="fileInput" type="file" multiple hidden />
          </div>
        </section>

        <section class="filters card">
          <div id="typeTabs" class="tabs"></div>
          <div class="sorts">
            <select id="sortSelect">
              <option value="uploadedAt">按时间</option>
              <option value="size">按大小</option>
              <option value="name">按名称</option>
              <option value="favorite">按收藏</option>
            </select>
            <button id="orderBtn" class="btn btn--ghost">倒序</button>
          </div>
        </section>

        <section class="uploadPanel card">
          <div class="card__heading">
            <h2>上传队列</h2>
            <span id="queueHint">拖拽文件到这里，或点击上传按钮</span>
          </div>
          <div id="dropZone" class="dropzone">
            <div>
              <strong>拖拽文件到此处</strong>
              <p>支持图片、视频、PPT、文档、压缩包等。上传采用分块方式，可重试。</p>
            </div>
          </div>
          <div id="queueList" class="queue"></div>
        </section>

        <section class="library card">
          <div class="card__heading">
            <h2>文件仓库</h2>
            <span id="resultHint">0 个文件</span>
          </div>
          <div id="fileList" class="fileList"></div>
        </section>
      </main>

      <aside class="preview card" id="previewPanel">
        <div class="card__heading">
          <h2>详情预览</h2>
          <button id="closePreviewBtn" class="btn btn--ghost preview__close">关闭</button>
        </div>
        <div id="previewEmpty" class="preview__empty">
          选择一个文件查看预览、备注、标签与操作。
        </div>
        <div id="previewContent" class="preview__content hidden">
          <div id="previewMedia" class="preview__media"></div>
          <div class="preview__meta">
            <div class="metaRow"><span>名称</span><strong id="metaName"></strong></div>
            <div class="metaRow"><span>时间</span><strong id="metaTime"></strong></div>
            <div class="metaRow"><span>大小</span><strong id="metaSize"></strong></div>
            <div class="metaRow"><span>类型</span><strong id="metaType"></strong></div>
            <div class="metaRow"><span>设备</span><strong id="metaDevice"></strong></div>
          </div>
          <div class="editor">
            <label>
              备注
              <textarea id="noteInput" rows="4" placeholder="写点备注，方便以后搜索"></textarea>
            </label>
            <label>
              标签
              <input id="tagsInput" type="text" placeholder="用逗号分隔，例如：工作, 备份, 临时" />
            </label>
            <div class="editor__actions">
              <button id="saveMetaBtn" class="btn btn--primary">保存</button>
              <button id="favoriteBtn" class="btn">收藏</button>
              <button id="downloadBtn" class="btn">下载</button>
              <button id="deleteBtn" class="btn btn--danger">删除</button>
              <button id="restoreBtn" class="btn btn--ghost hidden">恢复</button>
              <button id="purgeBtn" class="btn btn--ghost hidden">永久删除</button>
            </div>
          </div>
        </div>
      </aside>
    </div>

    <div id="toast" class="toast hidden"></div>

    <template id="fileCardTemplate">
      <article class="fileCard">
        <label class="fileCard__check">
          <input type="checkbox" class="selectFile" />
        </label>
        <button class="fileCard__main" type="button">
          <div class="fileCard__icon"></div>
          <div class="fileCard__body">
            <div class="fileCard__title"></div>
            <div class="fileCard__meta"></div>
            <div class="fileCard__tags"></div>
          </div>
          <div class="fileCard__fav"></div>
        </button>
      </article>
    </template>

    <template id="queueItemTemplate">
      <article class="queueItem">
        <div class="queueItem__header">
          <div>
            <strong class="queueItem__name"></strong>
            <p class="queueItem__meta"></p>
          </div>
          <span class="queueItem__status"></span>
        </div>
        <div class="progress">
          <div class="progress__bar"></div>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
