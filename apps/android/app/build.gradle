plugins {
    id "com.android.application"
}

android {
    namespace "com.vaultone.android"
    compileSdk 35

    defaultConfig {
        applicationId "com.vaultone.android"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }
}
